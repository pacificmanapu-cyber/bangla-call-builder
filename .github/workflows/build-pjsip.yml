name: Build PJSIP AAR

on:
  workflow_dispatch:

env:
  PJSIP_VERSION: "2.14.1"
  NDK_VERSION: "r21e"
  OPENSSL_VERSION: "3.3.1"

jobs:
  build-pjsip:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            swig \
            nasm \
            pkg-config \
            unzip \
            wget \
            curl

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download Android NDK
        run: |
          cd /tmp
          wget -q "https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux-x86_64.zip" -O ndk.zip
          unzip -q ndk.zip
          echo "ANDROID_NDK_ROOT=/tmp/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV

      - name: Download and Build OpenSSL for Android
        run: |
          cd /tmp
          wget -q "https://www.openssl.org/source/openssl-${OPENSSL_VERSION}.tar.gz" -O openssl.tar.gz
          tar xzf openssl.tar.gz
          cd openssl-${OPENSSL_VERSION}

          export PATH="/tmp/android-ndk-${NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"

          # Build for arm64-v8a
          ./Configure android-arm64 \
            -D__ANDROID_API__=24 \
            --prefix=/tmp/openssl-output/arm64-v8a \
            no-shared no-tests no-ui-console
          make -j$(nproc)
          make install_sw
          make clean

          # Build for armeabi-v7a
          ./Configure android-arm \
            -D__ANDROID_API__=24 \
            --prefix=/tmp/openssl-output/armeabi-v7a \
            no-shared no-tests no-ui-console
          make -j$(nproc)
          make install_sw
          make clean

      - name: Download PJSIP Source
        run: |
          cd /tmp
          wget -q "https://github.com/pjsip/pjproject/archive/refs/tags/${PJSIP_VERSION}.tar.gz" -O pjsip.tar.gz
          tar xzf pjsip.tar.gz
          echo "PJSIP_DIR=/tmp/pjproject-${PJSIP_VERSION}" >> $GITHUB_ENV

      - name: Configure PJSIP (config_site.h)
        run: |
          cat > /tmp/pjproject-${PJSIP_VERSION}/pjlib/include/pj/config_site.h << 'EOFCONFIG'
          #define PJ_CONFIG_ANDROID 1

          /* HD Voice codecs */
          #define PJMEDIA_HAS_SPEEX_CODEC 1
          #define PJMEDIA_HAS_G722_CODEC 1

          /* Security */
          #define PJMEDIA_HAS_SRTP 1
          #define PJMEDIA_SRTP_HAS_DTLS 1

          /* NAT traversal - fixes one-way audio */
          #define PJ_ICE_MAX_CAND 32
          #define PJ_ICE_MAX_CHECKS 150
          #define PJ_STUN_KEEP_ALIVE_SEC 15

          /* Audio quality */
          #define PJMEDIA_SOUND_BUFFER_COUNT 4
          #define PJMEDIA_SND_DEFAULT_REC_LATENCY 100
          #define PJMEDIA_SND_DEFAULT_PLAY_LATENCY 100

          /* Capacity */
          #define PJSUA_MAX_CALLS 4
          #define PJSUA_MAX_ACC 4

          /* Android audio */
          #define PJMEDIA_AUDIO_DEV_HAS_ANDROID_JNI 1
          #define PJMEDIA_AUDIO_DEV_HAS_OBOE 0

          /* Disable video, enable TLS */
          #define PJMEDIA_HAS_VIDEO 0
          #define PJSIP_HAS_TLS_TRANSPORT 1

          #include <pj/config_site_sample.h>
          EOFCONFIG

      - name: Build PJSIP for arm64-v8a
        run: |
          cd /tmp/pjproject-${PJSIP_VERSION}
          make distclean || true
          # Clean any stale .depend files
          find . -name "*.depend" -exec rm -f {} \;

          export ANDROID_NDK_ROOT="/tmp/android-ndk-${NDK_VERSION}"
          export PATH="${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"

          TARGET_ABI=arm64-v8a ./configure-android \
            --use-ndk-cflags \
            --with-ssl=/tmp/openssl-output/arm64-v8a

          make dep && make -j$(nproc)

          # Build PJSUA2 Java/JNI bindings via SWIG
          cd pjsip-apps/src/swig
          make -j$(nproc)

          # Collect outputs
          mkdir -p /tmp/pjsip-output/arm64-v8a/jniLibs
          mkdir -p /tmp/pjsip-output/arm64-v8a/java

          # The SWIG build produces libpjsua2.so in the java/android output
          find /tmp/pjproject-${PJSIP_VERSION}/pjsip-apps/src/swig -name "*.so" -exec cp {} /tmp/pjsip-output/arm64-v8a/jniLibs/ \;

          # Copy Java wrapper classes
          if [ -d "java/android/app/src/main/java" ]; then
            cp -r java/android/app/src/main/java/* /tmp/pjsip-output/arm64-v8a/java/
          fi
          if [ -d "java/output" ]; then
            cp -r java/output/* /tmp/pjsip-output/arm64-v8a/java/
          fi

      - name: Build PJSIP for armeabi-v7a
        run: |
          cd /tmp/pjproject-${PJSIP_VERSION}
          make distclean || true
          find . -name "*.depend" -exec rm -f {} \;

          export ANDROID_NDK_ROOT="/tmp/android-ndk-${NDK_VERSION}"
          export PATH="${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"

          TARGET_ABI=armeabi-v7a ./configure-android \
            --use-ndk-cflags \
            --with-ssl=/tmp/openssl-output/armeabi-v7a

          make dep && make -j$(nproc)

          cd pjsip-apps/src/swig
          make -j$(nproc)

          mkdir -p /tmp/pjsip-output/armeabi-v7a/jniLibs
          find /tmp/pjproject-${PJSIP_VERSION}/pjsip-apps/src/swig -name "*.so" -exec cp {} /tmp/pjsip-output/armeabi-v7a/jniLibs/ \;

      - name: Package AAR (Manual)
        run: |
          mkdir -p /tmp/aar-build/jni/arm64-v8a
          mkdir -p /tmp/aar-build/jni/armeabi-v7a

          # Copy native .so libraries
          cp /tmp/pjsip-output/arm64-v8a/jniLibs/*.so /tmp/aar-build/jni/arm64-v8a/ 2>/dev/null || true
          cp /tmp/pjsip-output/armeabi-v7a/jniLibs/*.so /tmp/aar-build/jni/armeabi-v7a/ 2>/dev/null || true

          # Compile Java classes into classes.jar
          mkdir -p /tmp/aar-build/classes
          JAVA_SOURCES=$(find /tmp/pjsip-output/arm64-v8a/java -name "*.java" 2>/dev/null)
          if [ -n "$JAVA_SOURCES" ]; then
            find /tmp/pjsip-output/arm64-v8a/java -name "*.java" > /tmp/java_sources.txt
            javac -source 8 -target 8 -d /tmp/aar-build/classes @/tmp/java_sources.txt 2>/dev/null || true
            cd /tmp/aar-build/classes
            jar cf /tmp/aar-build/classes.jar .
            cd /tmp
          else
            # Create empty classes.jar
            mkdir -p /tmp/aar-build/empty
            cd /tmp/aar-build/empty
            jar cf /tmp/aar-build/classes.jar .
            cd /tmp
          fi

          # Create AndroidManifest.xml
          cat > /tmp/aar-build/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="org.pjsip.pjsua2">
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.RECORD_AUDIO" />
            <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />
          </manifest>
          EOF

          # Package as AAR (AAR is just a ZIP with specific structure)
          cd /tmp/aar-build
          zip -r /tmp/pjsip-bangla-call.aar AndroidManifest.xml classes.jar jni/

      - name: List Build Outputs (Debug)
        if: always()
        run: |
          echo "=== PJSIP arm64 .so files ==="
          ls -la /tmp/pjsip-output/arm64-v8a/jniLibs/ 2>/dev/null || echo "No arm64 .so files"
          echo "=== PJSIP armv7 .so files ==="
          ls -la /tmp/pjsip-output/armeabi-v7a/jniLibs/ 2>/dev/null || echo "No armv7 .so files"
          echo "=== Java bindings ==="
          find /tmp/pjsip-output -name "*.java" 2>/dev/null | head -20 || echo "No Java files"
          echo "=== Final AAR ==="
          ls -la /tmp/pjsip-bangla-call.aar 2>/dev/null || echo "No AAR file"
          echo "=== AAR Contents ==="
          unzip -l /tmp/pjsip-bangla-call.aar 2>/dev/null || echo "No AAR to list"

      - name: Upload PJSIP AAR
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pjsip-bangla-call-aar
          path: /tmp/pjsip-bangla-call.aar
          if-no-files-found: warn

      - name: Upload Raw Build Outputs (Fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pjsip-raw-outputs
          path: /tmp/pjsip-output/
          if-no-files-found: warn
